services:
  app:
    image: localhost:5000/activepieces:latest
    container_name: activepieces-app
    restart: unless-stopped
    ports:
      - '4200:4200'
    depends_on:
      - redis
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=APP
      # Reach host Postgres from inside the container on Gentoo Linux
      - AP_POSTGRES_HOST=host.docker.internal
      # Absolute paths that match the mounted volumes
      - AP_CACHE_PATH=/usr/src/app/cache
      - AP_CONFIG_PATH=/usr/src/app/config
      # Use the Redis container instead of the in-memory queue
      - AP_QUEUE_MODE=REDIS
      - AP_REDIS_TYPE=STANDALONE
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_LOG_PRETTY=false
      - AP_PIECES_SOURCE=CLOUD_AND_DB
      - AP_PIECES_SYNC_MODE=OFFICIAL_AUTO
      - AP_DEV_PIECES=orocommerce
    volumes:
      - ./cache:/usr/src/app/cache
      - ./dev/config:/usr/src/app/config
    extra_hosts:
      # Maps host.docker.internal → host bridge IP on Linux (no-op on Docker Desktop)
      - "host.docker.internal:host-gateway"
    networks:
      - activepieces
  worker:
    image: localhost:5000/activepieces:latest
    restart: unless-stopped
    depends_on:
      - app
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=WORKER
      - AP_POSTGRES_HOST=host.docker.internal
      - AP_CACHE_PATH=/usr/src/app/cache
      - AP_CONFIG_PATH=/usr/src/app/config
      - AP_QUEUE_MODE=REDIS
      - AP_REDIS_TYPE=STANDALONE
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_FRONTEND_URL=http://activepieces-app:8080
      - AP_LOG_PRETTY=false
      - AP_PIECES_SOURCE=CLOUD_AND_DB
      - AP_PIECES_SYNC_MODE=OFFICIAL_AUTO
      - AP_DEV_PIECES=orocommerce
    deploy:
      replicas: 2
    volumes:
      - ./cache:/usr/src/app/cache
      - ./dev/config:/usr/src/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - activepieces
  redis:
    image: 'redis:7.0.7'
    container_name: redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - activepieces
volumes:
  redis_data:
networks:
  activepieces:
